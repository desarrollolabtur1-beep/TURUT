</div>
<button class="text-gray-400 hover:opacity-80 transition-opacity active:scale-95 duration-200">

<div class="flex items-center gap-1.5 text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="location_on">location_on</span>
<span class="text-sm font-medium">12km away • Ibagué</span>
</div>
</div>
</div>
