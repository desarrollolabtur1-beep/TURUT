<header class="fixed top-0 w-full z-50 bg-transparent flex justify-between items-center px-6 py-4 w-full">
<h1 class="font-headline font-black text-2xl text-primary tracking-tighter">Wohin</h1>
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary-fixed-dim active:scale-95 transition-transform">

</button>
<div class="w-10 h-10 rounded-full border-2 border-primary/20 p-0.5 overflow-hidden active:scale-95 transition-transform">

<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent opacity-80"></div>

<div class="glass-card neon-glow-secondary border border-secondary/20 rounded-full px-4 py-2 flex items-center gap-2 animate-pulse">

<span class="text-secondary font-headline font-bold text-sm tracking-tight">04:59</span>

</div>

<span class="text-secondary font-label text-xs font-extrabold uppercase tracking-[0.2em]">Discovery</span>
<h2 class="text-white font-headline text-2xl font-bold tracking-tight">Sunset at Combeima</h2>
<div class="flex items-center gap-2 mt-2">
<span class="material-symbols-outlined text-primary text-sm">location_on</span>
<span class="text-on-surface-variant font-medium text-sm">12km away • Ibagué</span>
</div>
</div>
</div>
</div>

<div class="flex items-center gap-8 mt-10 z-30">

<button class="w-16 h-16 rounded-full glass-card border border-white/5 flex items-center justify-center text-white/40 hover:text-error hover:border-error/30 transition-all duration-300 active:scale-90 shadow-xl">

<div class="w-3 h-3 rounded-full bg-primary/20"></div>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</a>
<!-- Inactive Nav: Search -->
<a class="flex flex-col items-center justify-center text-white/50 hover:text-white transition-colors active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined">search</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Search</span>

<span class="material-symbols-outlined">person</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Profile</span>
</a>

<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 blur-[120px] pointer-events-none"></div>
